apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: localstack-app
  namespace: argocd-system
spec:
  project: default
  source:
    repoURL: https://localstack.github.io/helm-charts
    chart: localstack
    targetRevision: 0.6.7
    env:
      - name: LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT
        value: "1"
    extraEnvVars:
      - name: LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT
        value: "1"
    helm:
      releaseName: localstack
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: localstack-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
